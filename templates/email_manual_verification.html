<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manual Email Verification | Geldia</title>
    <meta
        name="description"
        content="Manually verify your Geldia account by pasting your verification token."
    >
    <style>
        :root {
            --color-primary: #006cd1;
            --color-primary-light: #5cb7ff;
            --color-ink: #172033;
            --color-muted: #5f6f86;
            --color-surface: rgba(255, 255, 255, 0.88);
            --shadow-card: 0 24px 60px rgba(20, 55, 103, 0.16);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--color-ink);
            background:
                radial-gradient(circle at top left, rgba(92, 183, 255, 0.28), transparent 28%),
                radial-gradient(circle at bottom right, rgba(0, 108, 209, 0.18), transparent 22%),
                linear-gradient(180deg, #fcfeff 0%, #eef6ff 100%);
        }

        .card {
            width: min(100%, 760px);
            border-radius: 32px;
            padding: 40px;
            background: var(--color-surface);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255, 255, 255, 0.72);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            font-size: 0.92rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            color: #fff;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            box-shadow: 0 16px 32px rgba(0, 108, 209, 0.24);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            margin-bottom: 18px;
            font-size: 0.86rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--color-primary);
            background: rgba(0, 108, 209, 0.1);
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2.2rem, 6vw, 4.4rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
            max-width: 12ch;
        }

        p {
            margin: 0;
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--color-muted);
            max-width: 58ch;
        }

        .panel {
            margin-top: 28px;
            padding: 22px 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(0, 108, 209, 0.1);
        }

        .panel strong {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }

        .token-form {
            display: grid;
            gap: 14px;
            margin-top: 22px;
        }

        .token-form label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .token-form input {
            width: 100%;
            min-height: 54px;
            padding: 0 18px;
            border-radius: 16px;
            border: 1px solid rgba(0, 108, 209, 0.18);
            background: rgba(255, 255, 255, 0.96);
            color: var(--color-ink);
            font-size: 1rem;
        }

        .token-form input:focus {
            outline: 2px solid rgba(0, 108, 209, 0.18);
            border-color: var(--color-primary);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 28px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 999px;
            font-weight: 700;
            text-decoration: none;
            border: 0;
            cursor: pointer;
        }

        .button-primary {
            color: #fff;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            box-shadow: 0 16px 28px rgba(0, 108, 209, 0.2);
        }

        .button-secondary {
            color: var(--color-primary);
            background: #fff;
            border: 1px solid rgba(0, 108, 209, 0.16);
        }

        @media (max-width: 640px) {
            .card {
                padding: 28px 22px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand">
            <span class="brand-mark">G</span>
            <span>Geldia</span>
        </div>

        <div class="status-badge">Manual Verification</div>

        <h1>Enter your verification token.</h1>

        <p>
            If the email verification link did not open correctly, copy the token from your email and paste it below.
        </p>

        <section class="panel">
            <strong>Manual Verification</strong>
            <span>Paste the token from your email to verify your account.</span>
            <form class="token-form" method="get" action="{{ request.path }}">
                <label for="token">Verification token</label>
                <input id="token" name="token" type="text" placeholder="Paste your token here" required>
                <button class="button button-primary" type="submit">Verify account</button>
            </form>
        </section>

        <div class="actions">
            <a class="button button-secondary" href="{{ app_url }}">Open Geldia Web</a>
        </div>
    </main>
</body>
</html>

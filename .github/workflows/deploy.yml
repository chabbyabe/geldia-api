name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    environment: prod

    steps:
      - name: Check AUTO_DEPLOY flag
        id: gate
        run: |
          if [ "${{ secrets.AUTO_DEPLOY }}" = "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop workflow if deployment is disabled
        if: steps.gate.outputs.deploy != 'true'
        run: |
          echo "🚫 AUTO_DEPLOY is not enabled. Exiting safely."
          exit 0

      - name: Set up Python
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        if: steps.gate.outputs.deploy == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Deploy to server
        if: steps.gate.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Go to project directory"
            cd "${{ secrets.WORK_DIR }}" || exit 1

            echo "Check current directory"
            pwd
            ls -la

            echo "Check git repo"
            git status

            git fetch origin "${{ secrets.MAIN_BRANCH }}"
            git reset --hard "origin/${{ secrets.MAIN_BRANCH }}"

            echo "Check Python 3.10"
            python3.10 --version

            echo "Install/Fix Poetry for Python 3.10"
            python3.10 -m pip install --upgrade pip
            python3.10 -m pip install --upgrade --force-reinstall poetry

            echo "Check Poetry"
            python3.10 -m poetry --version

            echo "Use Python 3.10 for Poetry env"
            python3.10 -m poetry env use python3.10

            echo "Install dependencies"
            python3.10 -m poetry install --no-interaction --no-root

            echo "Run migrations"
            python3.10 -m poetry run python manage.py migrate

            echo "Collect static"
            python3.10 -m poetry run python manage.py collectstatic --noinput

            echo "Deployment completed"
